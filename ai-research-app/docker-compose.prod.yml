version: "3.8"

services:
  app:
    image: ${IMAGE:-myorg/ai-research-app}:${APP_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      - mongodb
    networks:
      - webnet

  mongodb:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ai_research
    command: ["--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongodata:/data/db
    networks:
      - webnet

  # 初始化 replica set（只会在第一次运行时生效）
  mongo-init:
    image: mongo:7
    depends_on:
      - mongodb
    restart: "no"
    entrypoint: >
      mongosh --host mongodb:27017 --eval '\
        try { rs.initiate({ _id: "rs0", members: [{ _id: 0, host: "mongodb:27017" }] }) }\
        catch(e) { if (e.codeName !== "AlreadyInitialized") throw e }\
      '

volumes:
  mongodata:

networks:
  webnet:
