version: '3.8'

services:
  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # 配置文件挂载
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      
      # SSL 证书（如果使用 HTTPS）
      # - ./ssl:/etc/letsencrypt:ro
      
      # 日志目录
      - ./logs:/var/log/nginx
    networks:
      - shared-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  # 连接到各项目的共享网络
  shared-network:
    name: shared-network
    driver: bridge
    external: false
